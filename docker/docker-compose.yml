services:
  app:
    image: beginor/net-core-app:amd64
    platform: linux/amd64
    ports:
      - 5050:5050
    volumes:
      - ./config:/app/config
      - ./log:/app/log
      - ./cache:/app/cache
    environment:
      TZ: Asia/Shanghai
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5050
      ASPNETCORE_PATHBASE: /net-core-app
    restart: unless-stopped
networks:
  default:
    external: true
    name: compose
